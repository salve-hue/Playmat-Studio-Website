<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 118 84" width="118" height="84">
  <defs>
    <linearGradient id="fb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8890a8"/>
      <stop offset="20%"  stop-color="#b2bccf"/>
      <stop offset="60%"  stop-color="#6e7888"/>
      <stop offset="100%" stop-color="#44505e"/>
    </linearGradient>
    <linearGradient id="fc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5e6878"/>
      <stop offset="100%" stop-color="#363c4c"/>
    </linearGradient>
  </defs>

  <!-- Rolled playmat cylinder, tilted ~20 deg from vertical -->
  <g transform="rotate(20, 59, 42)">
    <!-- Cylinder body -->
    <rect x="46" y="7" width="26" height="70" fill="url(#fb)"/>
    <!-- Bottom end cap -->
    <ellipse cx="59" cy="77" rx="13" ry="4.5" fill="url(#fc)"/>
    <!-- Top opening: outer dark rim -->
    <ellipse cx="59" cy="7" rx="13" ry="4.5" fill="#252a3a"/>
    <!-- Mat cross-section: concentric brand-colour rings -->
    <ellipse cx="59" cy="7" rx="10.5" ry="3.6" fill="#6830BB"/>
    <ellipse cx="59" cy="7" rx="8"    ry="2.8" fill="#30BBAD"/>
    <ellipse cx="59" cy="7" rx="5.5"  ry="2.0" fill="#83BB30"/>
    <ellipse cx="59" cy="7" rx="3"    ry="1.3" fill="#6830BB"/>
    <ellipse cx="59" cy="7" rx="1"    ry="0.5" fill="#30BBAD"/>
  </g>
</svg>
