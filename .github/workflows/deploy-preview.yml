name: Deploy Branch Preview

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          path: feature

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-site

      - name: Assemble deployment directory
        run: |
          mkdir -p deploy
          # Main site goes to root
          cp -r main-site/. deploy/
          rm -rf deploy/.github
          # Feature branch goes to /preview/
          mkdir -p deploy/preview
          cp -r feature/. deploy/preview/
          rm -rf deploy/preview/.github

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          publish_branch: gh-pages
          cname: playmatstudio.com
