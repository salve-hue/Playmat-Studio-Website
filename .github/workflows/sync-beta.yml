name: Sync beta to main

on:
  push:
    branches:
      - 'claude/setup-standalone-demo-site-gfFAb'
    paths:
      - 'beta/**'
      - 'assets/js/tool.js'
      - 'assets/css/tool.css'
      - 'index.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync files to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp beta/index.html /tmp/beta-index.html
          cp assets/js/tool.js /tmp/tool.js
          cp assets/css/tool.css /tmp/tool.css
          cp index.html /tmp/index.html
          git fetch origin main
          git checkout main
          mkdir -p beta assets/js assets/css
          cp /tmp/beta-index.html beta/index.html
          cp /tmp/tool.js assets/js/tool.js
          cp /tmp/tool.css assets/css/tool.css
          cp /tmp/index.html index.html
          git add beta/index.html assets/js/tool.js assets/css/tool.css index.html
          git diff --staged --quiet || git commit -m "sync: tool files from feature branch [skip ci]"
          git push origin main
