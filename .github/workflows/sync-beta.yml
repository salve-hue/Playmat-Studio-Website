name: Sync beta to main

on:
  push:
    branches:
      - 'claude/setup-standalone-demo-site-gfFAb'
    paths:
      - 'beta/**'
      - 'assets/js/tool.js'
      - 'assets/css/tool.css'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync files to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp beta/index.html /tmp/beta-index.html
          cp assets/js/tool.js /tmp/tool.js
          cp assets/css/tool.css /tmp/tool.css
          git fetch origin main
          git checkout main
          mkdir -p beta assets/js assets/css
          cp /tmp/beta-index.html beta/index.html
          cp /tmp/tool.js assets/js/tool.js
          cp /tmp/tool.css assets/css/tool.css
          git add beta/index.html assets/js/tool.js assets/css/tool.css
          git diff --staged --quiet || git commit -m "sync: tool files from feature branch"
          git push origin main

      - name: Trigger Pages deployment
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-main.yml/dispatches" \
            -d '{"ref":"main"}'
