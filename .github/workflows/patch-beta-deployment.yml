name: Patch Beta Deployment into Main Workflow

on:
  push:
    branches:
      - 'claude/**'
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Add beta step to deploy-main.yml on main branch
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: fileData } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows/deploy-main.yml',
              ref: 'main'
            });

            const current = Buffer.from(fileData.content, 'base64').toString('utf-8');

            if (current.includes('preview-site/beta')) {
              core.info('Beta step already present in deploy-main.yml — nothing to do.');
              return;
            }

            const betaBlock = [
              "          if [ -d preview-site/beta ]; then",
              "            mkdir -p deploy/beta",
              "            cp -r preview-site/beta/. deploy/beta/",
              "            printf 'User-agent: *\\nDisallow: /\\n' > deploy/beta/robots.txt",
              "          fi"
            ].join('\n');

            // Insert beta block right after the closing `fi` of the preview block
            const marker = "            printf 'User-agent: *\\nDisallow: /\\n' > deploy/preview/robots.txt\n          fi";
            if (!current.includes(marker)) {
              core.setFailed('Could not find insertion marker in deploy-main.yml. Manual update required.');
              return;
            }

            const updated = current.replace(marker, marker + '\n' + betaBlock);

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/workflows/deploy-main.yml',
              message: 'Add /beta/ deployment step to deploy-main.yml',
              content: Buffer.from(updated).toString('base64'),
              sha: fileData.sha,
              branch: 'main'
            });

            core.info('Successfully patched deploy-main.yml on main.');
