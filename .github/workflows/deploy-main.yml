name: Deploy Main Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main-site

      - name: Checkout preview branch (for /preview/)
        uses: actions/checkout@v4
        with:
          ref: claude/document-page-overview-o7u0M
          path: preview-site
        continue-on-error: true

      - name: Assemble site
        run: |
          mkdir -p deploy
          cp -r main-site/. deploy/
          rm -rf deploy/.git deploy/.github
          if [ -d preview-site ]; then
            mkdir -p deploy/preview
            cp -r preview-site/. deploy/preview/
            rm -rf deploy/preview/.git deploy/preview/.github deploy/preview/CNAME
            printf 'User-agent: *\nDisallow: /\n' > deploy/preview/robots.txt
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
