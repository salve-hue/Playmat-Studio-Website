name: Deploy Main Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          path: main-site

      - name: Checkout claude branch (for preview/)
        uses: actions/checkout@v4
        with:
          ref: preview
          path: claude-site

      - name: Assemble site
        run: |
          mkdir -p deploy
          cp -r main-site/. deploy/
          rm -rf deploy/.git deploy/.github
          mkdir -p deploy/preview
          cp -r claude-site/. deploy/preview/
          rm -rf deploy/preview/.git deploy/preview/.github
          printf 'User-agent: *\nDisallow: /\n' > deploy/preview/robots.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
